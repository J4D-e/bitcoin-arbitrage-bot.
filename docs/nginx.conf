# /etc/nginx/sites-available/arbitrage-bot
# Reemplaza TU_IP_O_DOMINIO con tu IP de Contabo o dominio

server {
    listen 80;
    server_name TU_IP_O_DOMINIO;

    # ── Frontend (archivos estáticos) ─────────────────────
    root /var/www/arbitrage-bot;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API REST ──────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── WebSocket ─────────────────────────────────────────
    # CRÍTICO: estos headers son obligatorios para WS
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;   # 24h — mantener WS abierto
        proxy_send_timeout 86400;
    }
}
